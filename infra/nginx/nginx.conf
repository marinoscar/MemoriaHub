# =============================================================================
# Nginx Configuration - Reverse Proxy
# =============================================================================
# Routes:
#   /           -> web (React frontend)
#   /api        -> api (NestJS backend)
#   /api/docs   -> api (Swagger UI)
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------------------------
    # Dynamic upstream resolution
    # -------------------------------------------------------------------------
    # Use Docker's embedded DNS (127.0.0.11) so nginx RE-RESOLVES the `api` and
    # `web` service names at runtime instead of caching the IP once at startup.
    # When those containers are recreated (e.g. `docker compose up -d api`) they
    # get a NEW IP; a static `upstream { server api:3000; }` block keeps using
    # the stale IP and returns 502 until nginx is restarted. Combining this
    # resolver with a variable in `proxy_pass` (see below) makes nginx look the
    # name up again on the resolver's `valid` interval, so redeploys self-heal
    # within ~10s and no nginx restart is needed.
    #
    # Trade-off: variable `proxy_pass` bypasses `upstream` blocks, so upstream
    # keepalive is not used. Acceptable for this same-origin dev/test proxy.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Allow large photo/video uploads through the simple-upload endpoint
    # (POST /api/storage/objects). Matches the host nginx limit and the
    # MAX_FILE_SIZE app setting (10GB). Resumable multipart uploads go
    # directly to S3 via pre-signed URLs and bypass nginx entirely.
    client_max_body_size 10g;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript;

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # -------------------------------------------------------------------------
        # API routes -> NestJS backend
        # -------------------------------------------------------------------------
        location /api {
            # Variable target forces per-request re-resolution via the resolver
            # above. No URI part on proxy_pass => the original request URI
            # (e.g. /api/health/ready) is forwarded unchanged.
            set $api_upstream http://api:3000;
            proxy_pass $api_upstream;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # WebSocket support (if needed)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # -------------------------------------------------------------------------
        # Frontend routes -> React app
        # -------------------------------------------------------------------------
        location / {
            set $web_upstream http://web:5173;
            proxy_pass $web_upstream;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for HMR in development
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # -------------------------------------------------------------------------
        # Health check endpoint for nginx itself
        # -------------------------------------------------------------------------
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
