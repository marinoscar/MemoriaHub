# =============================================================================
# Docker Compose - Base Services
# =============================================================================
# Usage (run from infra/compose folder):
#   docker compose -f base.compose.yml -f dev.compose.yml up
#
# With observability:
#   docker compose -f base.compose.yml -f dev.compose.yml -f otel.compose.yml up
#
# Production:
#   docker compose -f base.compose.yml -f prod.compose.yml up
#
# Note: .env file is in this folder (infra/compose/)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx - Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      # 8327 is the memoriahub slot in the dev.marin.cr host-nginx map.
      # See docs/ssl-nginx-setup.md for the full port table.
      - "8327:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # API - NestJS Backend
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile
    # Load every variable from .env (APP_URL, COOKIE_SECRET, STORAGE_*, DEVICE_*,
    # etc.) so newly added env vars don't have to be enumerated below. The explicit
    # `environment` entries still take precedence over values from the env_file.
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-3000}
      - APP_URL=${APP_URL}
      # Database connection (individual variables)
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-appdb}
      - POSTGRES_SSL=${POSTGRES_SSL:-false}
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TTL_MINUTES=${JWT_ACCESS_TTL_MINUTES:-15}
      - JWT_REFRESH_TTL_DAYS=${JWT_REFRESH_TTL_DAYS:-14}
      # OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      # AWS
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # Admin bootstrap
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL}
      # Observability
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-memoriahub-api}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - app-network
      # Shared network where the central postgres container (hostname `postgres`)
      # lives. Required because POSTGRES_HOST=postgres resolves on devnet.
      - devnet

  # ---------------------------------------------------------------------------
  # Web - React Frontend
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # CompreFace - Self-hosted face recognition sidecar (default face provider)
  # NOTE: Uses its own bundled Postgres (compreface-db) — NOT the app database.
  # Image tag: confirm 'exadel/compreface:latest' is the Mobilenet CPU build
  # on https://hub.docker.com/r/exadel/compreface. If a specific tag like
  # '1.2.0-mobilenet' is available, prefer it for reproducibility.
  # ---------------------------------------------------------------------------
  compreface:
    image: exadel/compreface:latest  # TODO: pin to specific Mobilenet tag
    environment:
      - POSTGRES_USER=compreface
      - POSTGRES_PASSWORD=${COMPREFACE_DB_PASSWORD:-compreface_secret}
      - POSTGRES_DB=compreface
      - POSTGRES_URL=jdbc:postgresql://compreface-db:5432/compreface
      - SPRING_PROFILES_ACTIVE=dev
    ports:
      - "8000:8000"
    depends_on:
      - compreface-db
    networks:
      - app-network
    # VPS tuning: limit open file descriptors for a shared CPU server
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  compreface-db:
    image: postgres:14-alpine
    environment:
      - POSTGRES_USER=compreface
      - POSTGRES_PASSWORD=${COMPREFACE_DB_PASSWORD:-compreface_secret}
      - POSTGRES_DB=compreface
    volumes:
      - compreface-db-data:/var/lib/postgresql/data
    networks:
      - app-network

# =============================================================================
# Networks
# =============================================================================
networks:
  app-network:
    driver: bridge
  # Shared external network created once on the host (`docker network create devnet`);
  # the central postgres container is reachable here as hostname `postgres`.
  devnet:
    external: true
    name: devnet

# =============================================================================
# Volumes
# =============================================================================
volumes:
  compreface-db-data:
