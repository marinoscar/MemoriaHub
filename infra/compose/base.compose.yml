# =============================================================================
# Docker Compose - Base Services
# =============================================================================
# Usage (run from infra/compose folder):
#   docker compose -f base.compose.yml -f dev.compose.yml up
#
# With observability:
#   docker compose -f base.compose.yml -f dev.compose.yml -f otel.compose.yml up
#
# Production:
#   docker compose -f base.compose.yml -f prod.compose.yml up
#
# Note: .env file is in this folder (infra/compose/)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Nginx - Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      # 8327 is the memoriahub slot in the dev.marin.cr host-nginx map.
      # See docs/ssl-nginx-setup.md for the full port table.
      - "8327:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # API - NestJS Backend
  # ---------------------------------------------------------------------------
  api:
    build:
      # Context is the repo root (not apps/api) so npm workspaces can
      # resolve the local @memoriahub/enrichment-compute package under
      # packages/enrichment-compute. See apps/api/Dockerfile for detail.
      context: ../..
      dockerfile: apps/api/Dockerfile
    # Load every variable from .env (APP_URL, COOKIE_SECRET, STORAGE_*, DEVICE_*,
    # etc.) so newly added env vars don't have to be enumerated below. The explicit
    # `environment` entries still take precedence over values from the env_file.
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-3000}
      - APP_URL=${APP_URL}
      # Database connection (individual variables)
      - POSTGRES_HOST=${POSTGRES_HOST:-db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-appdb}
      - POSTGRES_SSL=${POSTGRES_SSL:-false}
      # JWT
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TTL_MINUTES=${JWT_ACCESS_TTL_MINUTES:-15}
      - JWT_REFRESH_TTL_DAYS=${JWT_REFRESH_TTL_DAYS:-14}
      # OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      # AWS
      - S3_BUCKET=${S3_BUCKET}
      - S3_REGION=${S3_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # Admin bootstrap
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL}
      # Observability
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-memoriahub-api}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - app-network
      # Shared network where the central postgres container (hostname `postgres`)
      # lives. Required because POSTGRES_HOST=postgres resolves on devnet.
      - devnet

  # ---------------------------------------------------------------------------
  # Web - React Frontend
  # ---------------------------------------------------------------------------
  web:
    build:
      # Context widened to the repo root to match the api service's
      # convention, so a future workspace dependency doesn't require
      # revisiting this file again.
      context: ../..
      dockerfile: apps/web/Dockerfile
    networks:
      - app-network

  # ---------------------------------------------------------------------------
  # CompreFace Core — Keyless ML engine sidecar (default face provider)
  #
  # Runs the bare CompreFace core ML container: RetinaFace detector +
  # ArcFace MobileFaceNet calculator. No gateway, no admin UI, no Postgres,
  # no API key. The API reaches it directly at http://compreface-core:3000
  # on the shared app-network.
  #
  # Key endpoints used by the face provider:
  #   GET  /status                                         → health check
  #   POST /find_faces?face_plugins=calculator&det_prob_threshold=0.8
  #        multipart field: file=<image>                  → bounding box + 128-d embedding
  # ---------------------------------------------------------------------------
  compreface-core:
    image: exadel/compreface-core:1.2.0-mobilenet
    environment:
      - UWSGI_PROCESSES=1        # VPS tuning: single worker for shared CPU server
      - UWSGI_THREADS=1
    networks:
      - app-network
    # No ports exposed externally — the API reaches it via the docker network

# =============================================================================
# Networks
# =============================================================================
networks:
  app-network:
    driver: bridge
  # Shared external network created once on the host (`docker network create devnet`);
  # the central postgres container is reachable here as hostname `postgres`.
  devnet:
    external: true
    name: devnet

# =============================================================================
# Volumes
# =============================================================================
# (No application-specific volumes in base config; compreface-core is stateless)
