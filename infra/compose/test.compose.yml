version: '3.8'

services:
  db-test:
    # pgvector/pgvector:pg16 instead of postgres:16-alpine so the vector extension
    # is available for integration tests that exercise semantic search migrations.
    image: pgvector/pgvector:pg16
    container_name: enterprise-app-db-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_app_test
    ports:
      - "5433:5432"
    volumes:
      - test-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  test-db-data:
