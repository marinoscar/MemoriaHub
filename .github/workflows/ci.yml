name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # apps/api and apps/cli both import @memoriahub/enrichment-compute by
      # subpath (e.g. .../clip, .../dto) resolved against its built dist/ —
      # that output is git-ignored, so it must be built here on every fresh
      # checkout before anything that imports it can typecheck or run.
      - run: npm run build --workspace=@memoriahub/enrichment-compute

      - run: npx prisma generate
        working-directory: apps/api

      - run: npm run typecheck --workspace=api
      - run: npm run typecheck --workspace=web

      # Unit-scoped test runs. Integration specs (need a DB/harness CI lacks) and
      # known-rotted UI suites are excluded and tracked in docs/ci-known-failing-tests.md.
      - run: npm run test:ci --workspace=api
      - run: npm run test:ci --workspace=web

  cli-test:
    name: CLI Build & Test
    runs-on: ubuntu-latest
    # No `needs: build` — this job runs CONCURRENTLY with `build` on GitHub's
    # default parallel scheduling, not after it, so adding CLI coverage does
    # not add to the wall-clock time until the workflow shows all-green. Keep
    # it that way: this job is unit tests only (no docker/QEMU/image build —
    # that's the separate, deliberately slow multi-arch worker image build in
    # deploy.yml, which this job must never touch or depend on).
    env:
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Same rationale as the build job: apps/cli imports @memoriahub/enrichment-compute
      # by subpath resolved against its git-ignored dist/, built fresh here.
      - run: npm run build --workspace=@memoriahub/enrichment-compute

      - run: npm run typecheck --workspace=@memoriahub/cli

      # Unit-scoped test run. Fixture-drift and one concurrency-flaky suite are
      # excluded and tracked in docs/ci-known-failing-tests.md.
      - run: npm run test:ci --workspace=@memoriahub/cli
