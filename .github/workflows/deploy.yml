name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      api-image: ${{ steps.meta-api.outputs.tags }}
      web-image: ${{ steps.meta-web.outputs.tags }}
      version: ${{ steps.version.outputs.version }}
      cli-version: ${{ steps.cli-version.outputs.cli_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Get CLI version
        id: cli-version
        # The worker image is versioned by the CLI version so a given tag is
        # auditable against the parity package it ships (cli-<version>).
        run: echo "cli_version=$(node -p "require('./apps/cli/package.json').version")" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        # Enables linux/arm64 emulation for the multi-arch worker image build.
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build API image (amd64) for parity gate
        # Load a single-arch API image locally (no push yet) so the golden-vector
        # test can run inside the exact artifact — mirrors the worker parity gate
        # below. Shares the gha cache (scope=api) with the push build, so amd64
        # layers are reused and this doesn't double the build cost.
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          target: production
          platforms: linux/amd64
          load: true
          push: false
          tags: memoriahub-api:parity-gate
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Golden-vector parity gate (inside the API image)
        # Enforces AC#4 of issue #128: the parity test passes IDENTICALLY inside
        # the API image and the worker image, proving both build sharp against the
        # same HEIF-enabled libvips and decode the committed golden-fixture.heic
        # natively (no ffmpeg fallback) with the same JPEG dHash. REQUIRE_CLIP_MODEL
        # is intentionally NOT set here — the API image does not bake the CLIP model
        # (the server downloads it to MODELS_DIR at runtime), so the CLIP assertion
        # skips gracefully while the HEIC/JPEG dHash assertions run.
        run: |
          docker run --rm \
            --entrypoint node \
            -e MODELS_DIR=/app/models \
            -e REQUIRE_HEIC_DECODE=1 \
            -w /app/packages/enrichment-compute \
            memoriahub-api:parity-gate \
            --test test/golden.test.mjs

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          # Repo root: apps/api depends on the @memoriahub/enrichment-compute
          # workspace, so the Dockerfile needs root manifests + the workspace
          # member visible (matches infra/compose context: ../..).
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: ./apps/web
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      # -----------------------------------------------------------------------
      # memoriahub-worker image (multi-arch) + golden-vector parity gate
      # -----------------------------------------------------------------------
      - name: Extract metadata for Worker
        id: meta-worker
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker
          # Also tag cli-<version> so a running node's CLI version maps to an
          # auditable image (compute-parity guarantee).
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=cli-${{ steps.cli-version.outputs.cli_version }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build Worker image (amd64) for parity gate
        # Load a single-arch image locally (no push yet) so the golden-vector
        # test can run inside the exact artifact. Shares the gha cache with the
        # push build below, so amd64 layers are reused.
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/cli/Dockerfile
          target: worker
          platforms: linux/amd64
          load: true
          push: false
          tags: memoriahub-worker:parity-gate
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Golden-vector parity gate (inside the worker image)
        # Runs the shared parity test against the CLIP model baked into the
        # image. REQUIRE_CLIP_MODEL=1 makes a missing/misplaced model a hard
        # failure instead of a skip, so the gate actually exercises CLIP.
        # REQUIRE_HEIC_DECODE=1 makes "sharp cannot decode HEIC natively" a hard
        # failure too — proving the HEIF-enabled global libvips built into the
        # image decodes the committed golden-fixture.heic WITHOUT hitting the
        # ffmpeg fallback (issue #128). The gate also prints the computed HEIC
        # dHash for a maintainer to pin into GOLDEN_HEIC_DHASH.
        run: |
          docker run --rm \
            --entrypoint node \
            -e MODELS_DIR=/app/models \
            -e REQUIRE_CLIP_MODEL=1 \
            -e REQUIRE_HEIC_DECODE=1 \
            -w /app/packages/enrichment-compute \
            memoriahub-worker:parity-gate \
            --test test/golden.test.mjs

      - name: Build and push Worker image (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/cli/Dockerfile
          target: worker
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying version ${{ needs.build-and-push.outputs.version }} to staging"
          echo "API Image: ${{ needs.build-and-push.outputs.api-image }}"
          echo "Web Image: ${{ needs.build-and-push.outputs.web-image }}"
          # Add your deployment commands here (kubectl, docker-compose, etc.)

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://example.com

    steps:
      - name: Deploy to production
        run: |
          echo "Deploying version ${{ needs.build-and-push.outputs.version }} to production"
          echo "API Image: ${{ needs.build-and-push.outputs.api-image }}"
          echo "Web Image: ${{ needs.build-and-push.outputs.web-image }}"
          # Add your deployment commands here (kubectl, docker-compose, etc.)
